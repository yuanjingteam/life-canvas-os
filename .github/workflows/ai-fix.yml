name: AI 自动修复

on:
  workflow_run:
    workflows: ["构建测试"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

env:
  MAX_RETRIES: "3"
  FIX_LABEL: "ai-fix-in-progress"

jobs:
  ai-fix:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    outputs:
      attempt: ${{ steps.pr-check.outputs.attempt || '1' }}
      has_changes: ${{ steps.check-changes.outputs.has_changes || 'false' }}
      fix_branch: ${{ steps.commit.outputs.fix_branch || '' }}
      is_new_fix: ${{ steps.pr-check.outputs.is_new }}
      pr_url: ${{ steps.pr-check.outputs.pr_url }}
      skip_fix: ${{ steps.retry-check.outputs.skip_fix || 'false' }}
    steps:
      - name: 提取基础信息
        id: info
        run: |
          echo "run_id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT

      - name: 检查现有修复 PR
        id: pr-check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_INFO=$(gh pr list \
            --label "${{ env.FIX_LABEL }}" \
            --state open \
            --json number,title,body,labels \
            --jq '.[0]' 2>/dev/null || echo "null")

          if [ "$PR_INFO" != "null" ] && [ -n "$PR_INFO" ]; then
            PR_NUM=$(echo "$PR_INFO" | jq -r '.number')
            PR_URL="https://github.com/${{ github.repository }}/pull/$PR_NUM"
            RUN_ID_IN_PR=$(echo "$PR_INFO" | jq -r '.body' | grep -oP 'workflow run: \K[0-9]+' | head -1 || echo "")

            if [ "$RUN_ID_IN_PR" == "${{ steps.info.outputs.run_id }}" ]; then
              ATTEMPT=$(echo "$PR_INFO" | jq -r '.labels[] | select(.name | startswith("fix-attempt-")) | .name' | awk -F'-' '{print $NF}' | sort -n | tail -1 || echo "0")
              ATTEMPT=$((ATTEMPT + 1))
              echo "is_new=false" >> $GITHUB_OUTPUT
              echo "attempt=$ATTEMPT" >> $GITHUB_OUTPUT
              echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
              echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
            else
              echo "is_new=true" >> $GITHUB_OUTPUT
              echo "attempt=1" >> $GITHUB_OUTPUT
              echo "pr_url=" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_new=true" >> $GITHUB_OUTPUT
            echo "attempt=1" >> $GITHUB_OUTPUT
            echo "pr_url=" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
          fi

      - name: 检查重试限制
        id: retry-check
        run: |
          ATTEMPT=${{ steps.pr-check.outputs.attempt || '1' }}
          MAX=${{ env.MAX_RETRIES }}
          if [ "$ATTEMPT" -gt "$MAX" ]; then
            echo "skip_fix=true" >> $GITHUB_OUTPUT
            echo "skip_reason=max_retries_exceeded" >> $GITHUB_OUTPUT
          else
            echo "skip_fix=false" >> $GITHUB_OUTPUT
          fi
          echo "尝试次数: $ATTEMPT / $MAX"

      - name: 检出代码
        if: steps.retry-check.outputs.skip_fix != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.info.outputs.sha }}
          fetch-depth: 0

      - name: 下载 CI 产物
        if: steps.retry-check.outputs.skip_fix != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./ci-artifacts
          gh run download ${{ steps.info.outputs.run_id }} \
            --name pytest-report \
            --dir ./ci-artifacts/pytest 2>/dev/null || echo "no-pytest"
          gh run download ${{ steps.info.outputs.run_id }} \
            --name playwright-report \
            --dir ./ci-artifacts/playwright 2>/dev/null || echo "no-pw"
          gh run download ${{ steps.info.outputs.run_id }} \
            --name playwright-screenshots \
            --dir ./ci-artifacts/pw-screenshots 2>/dev/null || echo "no-ss"

      - name: 生成失败报告
        if: steps.retry-check.outputs.skip_fix != 'true'
        id: report
        run: |
          echo "# AI 修复分析" > ai_fix_report.md
          echo "" >> ai_fix_report.md
          echo "Workflow: ${{ steps.info.outputs.run_url }}" >> ai_fix_report.md
          echo "分支: ${{ steps.info.outputs.branch }}" >> ai_fix_report.md
          echo "尝试: ${{ steps.pr-check.outputs.attempt }} / ${{ env.MAX_RETRIES }}" >> ai_fix_report.md
          echo "" >> ai_fix_report.md
          echo "pytest 报告:" >> ai_fix_report.md
          ls ./ci-artifacts/pytest/ 2>/dev/null || echo "无" >> ai_fix_report.md
          cat ai_fix_report.md

      - name: 安装 Claude Code CLI
        if: steps.retry-check.outputs.skip_fix != 'true' && secrets.CLAUDE_API_KEY
        run: |
          if ! command -v claude-code &> /dev/null; then
            npm install -g @anthropic/claude-code 2>&1 | tail -2
          fi

      - name: 调用 Claude Code 修复
        if: steps.retry-check.outputs.skip_fix != 'true' && secrets.CLAUDE_API_KEY
        id: ai-fix
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-5' }}
        run: |
          if ! command -v claude-code &> /dev/null; then
            echo "CLI not found"
            exit 1
          fi

          PROMPT="Task: Fix CI test failure. Attempt ${{ steps.pr-check.outputs.attempt }} of ${{ env.MAX_RETRIES }}. See ai_fix_report.md. Stack: Electron+React frontend, Python FastAPI backend with pytest. Fix only test failures. Commit with Chinese message."

          echo "$PROMPT" > prompt.txt
          cat ai_fix_report.md >> prompt.txt

          claude-code --print --model $ANTHROPIC_MODEL "$(cat prompt.txt)" 2>&1 || true

      - name: 检查代码修改
        id: check-changes
        if: steps.retry-check.outputs.skip_fix != 'true'
        run: |
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交修复
        id: commit
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_BRANCH="ai-fix/run-${{ steps.info.outputs.run_id }}"
          echo "fix_branch=$FIX_BRANCH" >> $GITHUB_OUTPUT

          if git ls-remote --heads origin $FIX_BRANCH 2>/dev/null | grep -q .; then
            git fetch origin $FIX_BRANCH
            git checkout $FIX_BRANCH
            git pull origin $FIX_BRANCH
          else
            git checkout -b $FIX_BRANCH
          fi

          git config --local user.name "AI Auto-Fix"
          git config --local user.email "ai@openclaw.local"
          git add -A

          if git diff --staged --stat | grep -v "^$" | grep -q .; then
            git commit -m "fix: AI 自动修复 (第 ${{ steps.pr-check.outputs.attempt }} 次)"
            git push origin $FIX_BRANCH 2>&1 || echo "push failed"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no changes" >> $GITHUB_OUTPUT
          fi

      - name: 创建/更新 PR
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FIX_BRANCH="${{ steps.commit.outputs.fix_branch }}"

          if [ "${{ steps.pr-check.outputs.is_new }}" == "true" ]; then
            gh pr create \
              --title "AI fix attempt #${{ steps.pr-check.outputs.attempt }}" \
              --body "Fix attempt #${{ steps.pr-check.outputs.attempt }} of ${{ env.MAX_RETRIES }}" \
              --label "${{ env.FIX_LABEL }}" \
              --label "fix-attempt-${{ steps.pr-check.outputs.attempt }}" \
              --base main \
              --head $FIX_BRANCH 2>&1 || echo "PR exists"
          else
            PR_NUM="${{ steps.pr-check.outputs.pr_number }}"
            if [ -n "$PR_NUM" ]; then
              gh pr edit $PR_NUM --add-label "fix-attempt-${{ steps.pr-check.outputs.attempt }}" 2>&1 || true
            fi
          fi

      - name: 触发重新构建
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
            --method POST \
            --field ref=${{ steps.commit.outputs.fix_branch }} \
            2>&1 || echo "trigger failed"

      - name: 状态报告
        run: |
          echo "Done: attempt ${{ steps.pr-check.outputs.attempt }}/${{ env.MAX_RETRIES }}, changes=${{ steps.check-changes.outputs.has_changes }}"

  notify-max-retries:
    runs-on: ubuntu-latest
    needs: ai-fix
    if: always() && needs.ai-fix.outputs.skip_fix == 'true'
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 人工介入通知
        run: |
          echo "AI 修复已达上限 ${{ env.MAX_RETRIES }} 次"
          echo "Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}"
          if [ -n "${{ needs.ai-fix.outputs.pr_url }}" ]; then
            gh pr edit ${{ needs.ai-fix.outputs.pr_url }} \
              --remove-label "${{ env.FIX_LABEL }}" \
              --add-label "needs-human-fix" 2>/dev/null || true
          fi
