name: 构建测试

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ============================================================
  # 后端单元测试（pytest）
  # ============================================================
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装后端依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock

      - name: 运行后端测试
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml
        continue-on-error: true

      - name: 上传 pytest XML 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: backend/*.xml
          retention-days: 14

      - name: 上传测试日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-logs
          path: backend/tests/*.log
          retention-days: 14

  # ============================================================
  # 前端构建 + E2E 测试（Playwright）
  # ============================================================
  frontend-e2e:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 启用 Corepack
        run: npm i -g --force corepack && corepack enable

      - name: 安装 Node.js 和 PNPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Linux 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: 安装 Python 后端依赖
        run: |
          cd backend
          pip install -r requirements.txt

      - name: 安装前端依赖
        run: pnpm install

      - name: 代码检查
        run: pnpm lint
        continue-on-error: true

      - name: 类型检查
        run: pnpm typecheck
        continue-on-error: true

      - name: 安装 Playwright 浏览器
        run: pnpm playwright:install --with-deps chromium

      - name: 运行 Playwright E2E 测试（API 模式）
        run: pnpm test:api
        continue-on-error: true
        env:
          CI: true

      - name: 上传 Playwright 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/reports/
          retention-days: 14

      - name: 上传 Playwright 测试截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 14

  # ============================================================
  # 多平台构建测试
  # ============================================================
  build:
    runs-on: ${{ matrix.os }}
    needs: frontend-e2e
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 启用 Corepack
        run: npm i -g --force corepack && corepack enable

      - name: 安装 Node.js 和 PNPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Linux 系统依赖
        if: startsWith(matrix.os, 'ubuntu-latest')
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: 安装 Python 依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 构建 Python 后端
        run: |
          cd backend
          python -m PyInstaller backend.spec --clean

      - name: 安装前端依赖
        run: pnpm install

      - name: 构建应用
        run: pnpm compile:app
