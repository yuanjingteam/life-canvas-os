name: 发布应用

on:
  push:
    tags: ["v*"]

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false  # 一个平台失败不影响其他平台
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 启用 Corepack
        run: npm i -g --force corepack && corepack enable

      - name: 安装 Node.js 和 PNPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: 设置 Electron 缓存
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: 清理 electron-builder 缓存 (避免 app-builder 问题)
        run: |
          rm -rf ~/.cache/electron-builder/node_modules
          rm -rf node_modules/app-builder-bin

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Linux 系统更新
        if: startsWith(matrix.os, 'ubuntu-latest')
        run: |
          sudo apt-get update
          sudo apt autoremove
          sudo apt-get install -y libarchive-tools rpm

      - name: 安装 Python 依赖
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 构建 Python 后端
        run: |
          cd backend
          python -m PyInstaller backend.spec --clean
          
      - name: 验证 Python 构建产物
        run: |
          ls -la backend/dist/
          if [ "$RUNNER_OS" == "Windows" ]; then
            test -f backend/dist/backend.exe || exit 1
          else
            test -f backend/dist/backend || exit 1
          fi
        shell: bash

      - name: 安装前端依赖
        run: pnpm install

      - name: 构建前端应用
        run: pnpm compile:app

      - name: 发布 Electron 应用
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.github_token }}
          release: true
          max_attempts: 3
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder
